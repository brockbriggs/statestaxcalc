{% extends "base.html" %}
{% block title %}Compare 2026 State Taxes{% endblock %}

{% block content %}
<div class="container py-5">
    <h1 class="text-white fw-bold text-center mb-4">Compare Tax Burdens</h1>
    
    <div class="row justify-content-center mb-5">
        <div class="col-md-6 bg-dark p-4 rounded-3 border border-secondary">
            <div class="mb-3">
                <label class="text-light fw-bold">Enter Annual Salary</label>
                <input type="number" id="compareIncome" class="form-control bg-dark text-white border-secondary" value="150000">
            </div>
            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" id="compare1099">
                <label class="form-check-label text-light">Self-Employed (1099)</label>
            </div>
            <button onclick="runComparison()" class="btn btn-success w-100 fw-bold">Calculate & Compare</button>
        </div>
    </div>

    <div class="row mb-5 justify-content-center">
        <div class="col-md-10">
            <canvas id="compareChart" height="100"></canvas>
        </div>
    </div>

    <div class="table-responsive bg-dark p-4 rounded-3">
        <table class="table table-dark table-hover align-middle">
            <thead>
                <tr id="headerRow">
                    <th>Feature</th>
                    {% for state in selected_states %}
                    <th class="text-success text-center" data-slug="{{ state.slug }}">{{ state.name }}</th>
                    {% endfor %}
                </tr>
            </thead>
            <tbody id="comparisonBody">
                <tr id="row-federal"><td>Fed/SE Tax</td></tr>
                <tr id="row-state"><td>State Tax</td></tr>
                <tr id="row-total"><td>Total Tax</td></tr>
                <tr id="row-takehome"><td><strong>Take-Home Pay</strong></td></tr>
            </tbody>
        </table>
    </div>
    
    <div class="text-center mt-4">
        <a href="/" class="btn btn-outline-light me-2">Back to Calculators</a>
        <button onclick="clearComparison()" class="btn btn-danger">Clear Comparison</button>
    </div>
</div>

<script>
let myChart;
async function runComparison() {
    const income = document.getElementById('compareIncome').value;
    const is1099 = document.getElementById('compare1099').checked;
    const headers = document.querySelectorAll('#headerRow th[data-slug]');
    
    // Clear previous rows
    document.querySelectorAll('[id^="row-"] td:not(:first-child)').forEach(el => el.remove());

    let labels = [];
    let fedData = [];
    let stateData = [];
    let takeHomeData = [];

    for (let header of headers) {
        const slug = header.getAttribute('data-slug');
        
        try {
            const res = await fetch('/calculate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ income, filing_status: 'single', state_slug: slug, is_1099: is1099 })
            });
            const data = await res.json();

            // Update table rows
            document.getElementById('row-federal').insertAdjacentHTML('beforeend', `<td class="text-center">$${data.federal_tax.toLocaleString()}</td>`);
            document.getElementById('row-state').insertAdjacentHTML('beforeend', `<td class="text-center">$${data.state_tax.toLocaleString()}</td>`);
            document.getElementById('row-total').insertAdjacentHTML('beforeend', `<td class="text-center">$${data.total_tax.toLocaleString()}</td>`);
            document.getElementById('row-takehome').insertAdjacentHTML('beforeend', `<td class="text-center text-success fw-bold">$${data.take_home.toLocaleString()}</td>`);
            
            labels.push(header.innerText);
            fedData.push(data.federal_tax);
            stateData.push(data.state_tax);
            takeHomeData.push(data.take_home);
        } catch (e) {
            console.error("Comparison Error:", e);
        }
    }

    // Chart logic - Stacked Bar (Order: Take-Home (bottom), State, Fed (top))
    const ctx = document.getElementById('compareChart').getContext('2d');
    if (myChart) myChart.destroy();
    
    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: 'Take-Home Pay', data: takeHomeData, backgroundColor: '#10b981' }, // Green
                { label: 'State Tax', data: stateData, backgroundColor: '#ef4444' },       // Amber
                { label: 'Federal Tax', data: fedData, backgroundColor: '#eab308' }        // Blue
            ]
        },
        options: {
            responsive: true,
            scales: {
                x: { stacked: true, ticks: { color: '#e2e8f0' } },
                y: { stacked: true, ticks: { color: '#e2e8f0' } }
            },
            plugins: { 
                legend: { labels: { color: '#e2e8f0' } },
                tooltip: { 
                    mode: 'index', 
                    intersect: false,
                    callbacks: {
                        // This ensures the tooltip adds up the total correctly
                        footer: (items) => {
                            let total = items.reduce((sum, i) => sum + i.parsed.y, 0);
                            return 'Total Income: $' + total.toLocaleString();
                        }
                    }
                } 
            }
        }
    });
}

</script>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StateTaxCalc - 2026 Tax Calculators{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <!-- Navbar - exact match to screenshots -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">StatesTaxCalc</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="/all-calculators">Calculators</a></li>
                    <li class="nav-item"><a class="nav-link" href="/blog">Blog</a></li>
                    <li class="nav-item">
                        <a href="#" id="compareLink" class="nav-link text-success fw-bold" onclick="goToCompare()">
                            Compare States (<span id="compareCount">0</span>)
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="py-5 text-center text-muted small">
        © 2026 StateTaxCalc • Not tax advice • Updated for 2026 laws
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>

<script>
// Load saved states on page load
let compareList = JSON.parse(localStorage.getItem('compareStates') || '[]');
document.getElementById('compareCount').innerText = compareList.length;

function addToCompare(slug) {
    if (!compareList.includes(slug) && compareList.length < 4) {
        compareList.push(slug);
        localStorage.setItem('compareStates', JSON.stringify(compareList));
        document.getElementById('compareCount').innerText = compareList.length;
        alert("Added to comparison!");
    } else {
        alert("State already added or limit (4) reached.");
    }
}

function goToCompare() {
    if (compareList.length === 0) {
        alert("Add some states first!");
    } else {
        window.location.href = '/compare?states=' + compareList.join(',');
    }
}

function clearComparison() {
    localStorage.removeItem('compareStates');
    compareList = [];
    window.location.href = '/';
}
</script>
</html>
